services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vehicle-classifier-backend
    ports:
      - "8000:8000"
    # The model weights (~6 MB) are downloaded on first run.
    # Mount a volume so they are cached across container restarts.
    volumes:
      - model_cache:/root/.config/Ultralytics
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vehicle-classifier-frontend
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy

volumes:
  model_cache:
