services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vehicle-classifier-backend
    ports:
      - "8000:8000"
    environment:
      # Override to point at a pre-downloaded weights file (offline environments)
      # or to select a different YOLOv8 variant (e.g. yolov8s.pt).
      - MODEL_WEIGHTS=${MODEL_WEIGHTS:-yolov8n.pt}
      # Restrict CORS in production, e.g.:
      #   ALLOWED_ORIGINS=http://localhost:8501,https://myapp.example.com
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
    # The model weights (~6 MB) are downloaded on first run.
    # Mount a volume so they are cached across container restarts.
    volumes:
      - model_cache:/root/.config/Ultralytics
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request, sys; \
              try: r = urllib.request.urlopen('http://localhost:8000/health', timeout=5); sys.exit(0 if r.status == 200 else 1)\nexcept Exception: sys.exit(1)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vehicle-classifier-frontend
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy

volumes:
  model_cache:
